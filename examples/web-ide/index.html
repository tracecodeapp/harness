<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web IDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>html{background:#1e1f22}body{opacity:0}</style>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="ide-root">
      <!-- Toolbar -->
      <header class="ide-toolbar">
        <div class="toolbar-left">
          <a href="https://github.com/tracecodeapp/harness" class="toolbar-link" target="_blank" rel="noopener noreferrer" title="View on GitHub">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
              <path d="M9 18c-4.51 2-5-2-7-2"/>
            </svg>
          </a>
          <div class="toolbar-separator"></div>
          <span class="ide-brand">Web IDE</span>
        </div>

        <div class="toolbar-center">
          <div class="run-config">
            <div class="select-wrapper">
              <select id="language" class="ide-select" title="Language"></select>
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </div>
            <div class="separator"></div>
            <input id="function-name" class="ide-input" type="text" placeholder="Entry function" title="Main function name" />
          </div>

          <button id="run" class="toolbar-action run" type="button" title="Run">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/>
            </svg>
          </button>
          <button id="trace" class="toolbar-action trace" type="button" title="Trace">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 5h13"/><path d="M13 12h8"/><path d="M13 19h8"/><path d="M3 10a2 2 0 0 0 2 2h3"/><path d="M3 5v12a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
        </div>

        <div class="toolbar-right">
          <div class="status-dot" id="status-dot"></div>
          <div id="status" class="status-indicator">Ready</div>
        </div>
      </header>

      <!-- Workbench -->
      <main class="ide-workbench">
        <!-- Editor -->
        <div class="ide-editor-container">
          <div class="panel-header">
            <div class="tab active">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/>
              </svg>
              <span class="tab-label">main<span id="file-extension">.py</span></span>
            </div>
          </div>
          <div id="monaco-editor-root" class="monaco-root"></div>
        </div>

        <!-- Inputs Sidebar -->
        <div class="ide-sidebar">
          <div class="panel-header sidebar-header">
            <span>Inputs</span>
          </div>
          <div class="sidebar-content">
             <div id="monaco-inputs-root" class="monaco-root"></div>
          </div>
        </div>
      </main>

      <!-- Bottom Panel -->
      <footer class="ide-bottom-panel">
        <div class="panel-header tab-header" id="bottom-tabs">
          <button class="panel-tab active" data-tab="console">Console</button>
          <button class="panel-tab" data-tab="trace">Trace</button>
        </div>
        <div class="panel-body">
          <div id="console-tab-content" class="tab-content active">
            <div class="empty-state" id="console-empty">Run code to see output</div>
            <pre id="execution-output" class="terminal-text" style="display: none;"></pre>
          </div>
          <div id="trace-tab-content" class="tab-content">
            <div class="empty-state" id="trace-empty">Trace execution to see results</div>
            <pre id="trace-output" class="terminal-text" style="display: none;"></pre>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
